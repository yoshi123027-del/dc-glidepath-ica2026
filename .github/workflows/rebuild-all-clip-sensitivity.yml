name: Rebuild all strict-vs-clip sensitivity figures

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/rebuild-all-clip-sensitivity.yml
      - scripts/04_sensitivity/add_all_clip_overlays_20260721.py
      - scripts/04_sensitivity/low_balance_refined_sensitivity_20260714.py

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib scipy

      - name: Recompute strict and clipped sensitivity figures
        run: |
          python scripts/04_sensitivity/add_all_clip_overlays_20260721.py \
            --output-dir d0_sensitivity_outputs

      - name: Publish figures and summary
        run: |
          mkdir -p supplementary/figures results/sensitivity
          cp d0_sensitivity_outputs/figs/fig_D_sensitivity_glidepaths_N80.svg supplementary/figures/
          cp d0_sensitivity_outputs/figs/fig_r_sensitivity_glidepaths_N80.svg supplementary/figures/
          cp d0_sensitivity_outputs/figs/fig_mu_sensitivity_glidepaths_N80.svg supplementary/figures/
          cp d0_sensitivity_outputs/figs/fig_sigma_sensitivity_glidepaths_N80.svg supplementary/figures/
          cp d0_sensitivity_outputs/figs/fig_contrib_profile_sensitivity_glidepaths_N80.svg supplementary/figures/
          cp d0_sensitivity_outputs/all_strategies_strict_vs_clip_sensitivity_summary.csv results/sensitivity/

      - name: Commit regenerated outputs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supplementary/figures/*.svg results/sensitivity/all_strategies_strict_vs_clip_sensitivity_summary.csv
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "全解概念クリップ感応度図を再生成 [skip ci]"
            git push
          fi
