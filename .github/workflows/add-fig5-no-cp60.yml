name: Add Figure 5 without CP 60

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-fig5-no-cp60.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependencies
        run: python -m pip install --disable-pip-version-check pillow numpy

      - name: Generate Figure 5 without CP 60 benchmark
        run: |
          python - <<'PY'
          from pathlib import Path
          import numpy as np
          from PIL import Image

          source = Path('figs/fig_strict_vs_clipped_glidepaths_by_strategy_N480.png')
          target = Path('figs/fig_strict_vs_clipped_glidepaths_by_strategy_N480_no_cp60.png')

          original = np.array(Image.open(source).convert('RGB'))
          image = original.copy()

          # Remove the green CP 60% horizontal benchmark, including antialiasing.
          # Each affected pixel is restored to the dominant grayscale grid/background
          # value on the same row, so the axes and grid remain intact.
          bands = [
              (180, 1055, 458, 468),
              (1260, 2140, 466, 476),
              (180, 1055, 1195, 1205),
              (1260, 2140, 1180, 1189),
          ]
          for x0, x1, y0, y1 in bands:
              for y in range(y0, y1):
                  row = original[y, x0:x1].astype(int)
                  red, green, blue = row[:, 0], row[:, 1], row[:, 2]
                  green_pixels = (green > red + 1) & (green > blue + 1)
                  if not green_pixels.any():
                      continue
                  grayscale = (
                      (np.max(row, axis=1) - np.min(row, axis=1) <= 1)
                      & (row[:, 0] > 180)
                  )
                  values, counts = np.unique(row[grayscale, 0], return_counts=True)
                  fill = int(values[np.argmax(counts)]) if len(values) else 250
                  image[y, x0:x1][green_pixels] = [fill, fill, fill]

          # Keep the original Japanese legend artwork for the two relevant series,
          # remove the CP 60% legend item, and recenter the remaining two items.
          legend = original[24:84, 380:1245].copy()
          image[:90, :, :] = 255
          legend_x = (image.shape[1] - legend.shape[1]) // 2
          image[24:84, legend_x:legend_x + legend.shape[1]] = legend

          Image.fromarray(image).save(target)

          # Fail the workflow if green benchmark pixels remain in any target band.
          check = image.astype(int)
          for x0, x1, y0, y1 in bands:
              area = check[y0:y1, x0:x1]
              remaining = (
                  (area[:, :, 1] > area[:, :, 0] + 1)
                  & (area[:, :, 1] > area[:, :, 2] + 1)
              )
              if remaining.any():
                  raise RuntimeError('Green CP 60% pixels remain in the output image.')

          print(f'Created {target} ({target.stat().st_size} bytes)')
          PY

      - name: Commit generated image
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add figs/fig_strict_vs_clipped_glidepaths_by_strategy_N480_no_cp60.png
          git commit -m '図5からCP 60%補助線を削除した版を追加'
          git push origin HEAD:main
